<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LiquidSystem</title>
  <style>
    /* ── Variables ── */
    :root {
      --bg:           #0d1117;
      --surface:      #161b22;
      --surface-2:    #1c2128;
      --border:       #30363d;
      --text:         #c9d1d9;
      --muted:        #8b949e;
      --dim:          #484f58;
      --accent:       #58a6ff;
      --success:      #3fb950;
      --warning:      #d29922;
      --danger:       #f85149;
      --risk-high:    #f85149;
      --risk-medium:  #d29922;
      --risk-low:     #3fb950;
      --risk-minimal: #58a6ff;
      --header-bg:    #010409;
      --radius:       6px;
      --radius-lg:    10px;
    }

    /* ── Reset ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 15px; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, monospace;
      line-height: 1.6;
      min-height: 100vh;
    }
    a { color: var(--accent); text-decoration: none; }
    code {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 1px 5px;
      font-size: 0.85em;
      font-family: "SF Mono", "Fira Code", monospace;
    }

    /* ── Header ── */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--header-bg);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 0 20px;
      height: 56px;
    }
    .header-left { display: flex; align-items: baseline; gap: 10px; }
    .header-left h1 {
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text);
    }
    .header-left h1 span { color: var(--accent); }
    .header-sub {
      font-size: 0.75rem;
      color: var(--muted);
    }
    .header-right {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }
    #report-select {
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 5px 10px;
      font-size: 0.8rem;
      cursor: pointer;
      max-width: 220px;
    }
    #report-select:focus { outline: none; border-color: var(--accent); }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      border-radius: var(--radius);
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: opacity 0.15s, background 0.15s;
    }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-primary { background: var(--accent); color: #0d1117; }
    .btn-primary:hover:not(:disabled) { background: #79b8ff; }

    /* ── Status Banner ── */
    #status-banner {
      padding: 10px 20px;
      font-size: 0.85rem;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid var(--border);
    }
    #status-banner.running { background: rgba(88,166,255,0.08); color: var(--accent); }
    #status-banner.error   { background: rgba(248,81,73,0.08);  color: var(--danger); }
    #status-banner.success { background: rgba(63,185,80,0.08);  color: var(--success); }
    .spinner {
      width: 14px; height: 14px;
      border: 2px solid rgba(88,166,255,0.3);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Main Layout ── */
    main { max-width: 1280px; margin: 0 auto; padding: 24px 20px; }

    /* ── Empty State ── */
    .empty-state {
      text-align: center;
      padding: 80px 20px;
      color: var(--muted);
    }
    .empty-state h2 { font-size: 1.3rem; margin-bottom: 10px; color: var(--text); }
    .empty-state p  { margin-bottom: 24px; }

    /* ── Report Meta ── */
    .report-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      font-size: 0.8rem;
      color: var(--muted);
    }
    .report-meta strong { color: var(--text); }

    /* ── Section ── */
    .section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 20px;
      margin-bottom: 20px;
    }
    .section h2 {
      font-size: 0.9rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .section h2 .section-count {
      font-size: 0.75rem;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 1px 8px;
      font-weight: 500;
      text-transform: none;
      letter-spacing: 0;
      color: var(--text);
    }
    .section h3 {
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--muted);
      margin: 16px 0 8px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .section h3:first-of-type { margin-top: 0; }

    /* ── Stat Cards ── */
    .stat-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 20px;
    }
    .stat-card {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
    }
    .stat-label {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 4px;
    }
    .stat-value {
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--text);
      line-height: 1.2;
    }
    .stat-sub {
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 2px;
    }
    .stat-card.blocked .stat-value { color: var(--danger); }
    .stat-card.allowed .stat-value { color: var(--success); }

    /* ── Two-column table layout ── */
    .table-pair {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 16px;
    }
    .table-col h3 { margin-top: 0; }

    /* ── Data Tables ── */
    .table-wrap { overflow-x: auto; }
    .data-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.82rem;
    }
    .data-table thead th {
      text-align: left;
      padding: 6px 10px;
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
    }
    .data-table tbody tr { border-bottom: 1px solid var(--border); }
    .data-table tbody tr:last-child { border-bottom: none; }
    .data-table tbody tr:hover { background: var(--surface-2); }
    .data-table td {
      padding: 7px 10px;
      color: var(--text);
      vertical-align: middle;
    }
    .data-table td.num { text-align: right; font-variant-numeric: tabular-nums; }
    .data-table td.mono { font-family: "SF Mono", "Fira Code", monospace; font-size: 0.78rem; }
    .data-table td.muted { color: var(--muted); }
    .rank { color: var(--dim); font-size: 0.75rem; width: 24px; }

    /* ── Badges ── */
    .badge {
      display: inline-block;
      padding: 1px 7px;
      border-radius: 20px;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .badge-high    { background: rgba(248,81,73,0.15);   color: var(--risk-high);    border: 1px solid rgba(248,81,73,0.3);   }
    .badge-medium  { background: rgba(210,153,34,0.15);  color: var(--risk-medium);  border: 1px solid rgba(210,153,34,0.3);  }
    .badge-low     { background: rgba(63,185,80,0.15);   color: var(--risk-low);     border: 1px solid rgba(63,185,80,0.3);   }
    .badge-minimal { background: rgba(88,166,255,0.12);  color: var(--risk-minimal); border: 1px solid rgba(88,166,255,0.25); }
    .badge-doh     { background: rgba(248,81,73,0.15);   color: var(--danger);       border: 1px solid rgba(248,81,73,0.3);   }
    .badge-ptr     { background: rgba(210,153,34,0.15);  color: var(--warning);      border: 1px solid rgba(210,153,34,0.3);  }
    .badge-low-q   { background: rgba(210,153,34,0.12);  color: var(--warning);      border: 1px solid rgba(210,153,34,0.25); }

    /* ── Alert boxes ── */
    .alert {
      border-radius: var(--radius);
      padding: 10px 14px;
      font-size: 0.83rem;
      margin-bottom: 12px;
      border: 1px solid;
    }
    .alert-success { background: rgba(63,185,80,0.08);  border-color: rgba(63,185,80,0.25);  color: var(--success); }
    .alert-warning { background: rgba(210,153,34,0.08); border-color: rgba(210,153,34,0.25); color: var(--warning); }
    .alert-danger  { background: rgba(248,81,73,0.08);  border-color: rgba(248,81,73,0.25);  color: var(--danger); }

    /* ── Category sub-sections ── */
    .category-block {
      margin-bottom: 16px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .category-header {
      background: var(--surface-2);
      padding: 8px 12px;
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .category-header .cat-count {
      color: var(--muted);
      font-weight: 400;
    }

    /* ── AI Assessment ── */
    .assessment-body {
      font-size: 0.87rem;
      line-height: 1.75;
      color: var(--text);
    }
    .assessment-body h1,
    .assessment-body h2 {
      font-size: 1rem;
      font-weight: 700;
      color: var(--text);
      margin: 20px 0 8px;
      padding-bottom: 6px;
      border-bottom: 1px solid var(--border);
    }
    .assessment-body h3 {
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--text);
      margin: 14px 0 6px;
      text-transform: none;
      letter-spacing: 0;
    }
    .assessment-body h4 {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--muted);
      margin: 10px 0 4px;
      text-transform: none;
    }
    .assessment-body p  { margin-bottom: 10px; }
    .assessment-body ul,
    .assessment-body ol { margin: 8px 0 10px 20px; }
    .assessment-body li { margin-bottom: 4px; }
    .assessment-body strong { color: var(--text); font-weight: 600; }
    .assessment-body em { color: var(--muted); font-style: italic; }
    .assessment-body code {
      font-size: 0.8em;
      background: var(--surface-2);
      border: 1px solid var(--border);
    }

    /* ── Device grid ── */
    .risk-summary-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-bottom: 16px;
    }
    .risk-tile {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 14px;
      text-align: center;
    }
    .risk-tile .risk-count { font-size: 1.4rem; font-weight: 700; }
    .risk-tile .risk-label { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }
    .risk-tile.risk-high .risk-count    { color: var(--risk-high); }
    .risk-tile.risk-medium .risk-count  { color: var(--risk-medium); }
    .risk-tile.risk-low .risk-count     { color: var(--risk-low); }
    .risk-tile.risk-minimal .risk-count { color: var(--risk-minimal); }

    /* ── Utility ── */
    .hidden { display: none !important; }
    .text-muted { color: var(--muted); }
    .text-danger { color: var(--danger); }
    .text-success { color: var(--success); }
    .text-warning { color: var(--warning); }
    .mt-0 { margin-top: 0; }

    /* ── Footer ── */
    footer {
      text-align: center;
      padding: 20px;
      font-size: 0.75rem;
      color: var(--dim);
      border-top: 1px solid var(--border);
      margin-top: 12px;
    }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      header { padding: 0 12px; }
      .header-left h1 { font-size: 1rem; }
      .header-sub { display: none; }
      #report-select { max-width: 130px; font-size: 0.75rem; }
      main { padding: 14px 12px; }
      .stat-grid { grid-template-columns: repeat(2, 1fr); }
      .table-pair { grid-template-columns: 1fr; }
      .risk-summary-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 480px) {
      .stat-grid { grid-template-columns: 1fr 1fr; }
      .stat-value { font-size: 1.3rem; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>Liquid<span>System</span></h1>
    <span class="header-sub">LiquidLab Pi-hole Audit</span>
  </div>
  <div class="header-right">
    <select id="report-select" title="View a past report">
      <option value="">History…</option>
    </select>
    <button id="run-btn" class="btn btn-primary" onclick="runNow()">
      ▶ Run Now
    </button>
  </div>
</header>

<div id="status-banner" class="hidden"></div>

<main>
  <!-- Empty state (no reports yet) -->
  <div id="empty-state" class="empty-state hidden">
    <h2>No reports yet</h2>
    <p>Click <strong>Run Now</strong> to kick off your first Pi-hole audit.</p>
    <button class="btn btn-primary" onclick="runNow()">▶ Run First Analysis</button>
  </div>

  <!-- Report view -->
  <div id="report-view" class="hidden">
    <div class="report-meta">
      <span>Report <strong id="report-id-label"></strong></span>
      <span id="report-ts-label"></span>
    </div>

    <!-- Traffic Summary -->
    <div class="section" id="sec-traffic">
      <h2>Traffic Summary</h2>
      <div class="stat-grid" id="stat-cards"></div>

      <div class="table-pair">
        <div class="table-col">
          <h3>Top Allowed Domains</h3>
          <div class="table-wrap" id="tbl-allowed"></div>
        </div>
        <div class="table-col">
          <h3>Top Blocked Domains</h3>
          <div class="table-wrap" id="tbl-blocked"></div>
        </div>
      </div>

      <h3>Top Clients</h3>
      <div class="table-wrap" id="tbl-clients"></div>
    </div>

    <!-- DNS Bypass -->
    <div class="section" id="sec-bypass">
      <h2>DNS Bypass Detection <span class="section-count" id="bypass-count"></span></h2>
      <div id="bypass-content"></div>
    </div>

    <!-- Blocklist Recommendations -->
    <div class="section" id="sec-rec">
      <h2>Blocklist Recommendations <span class="section-count" id="rec-count"></span></h2>
      <div id="rec-content"></div>
    </div>

    <!-- Device Inventory -->
    <div class="section" id="sec-devices">
      <h2>Device Inventory <span class="section-count" id="device-count"></span></h2>
      <div class="risk-summary-grid" id="risk-tiles"></div>
      <div class="table-wrap" id="tbl-devices"></div>
    </div>

    <!-- AI Assessment -->
    <div class="section" id="sec-assessment">
      <h2>AI Assessment</h2>
      <div class="assessment-body" id="assessment-content"></div>
    </div>
  </div>
</main>

<footer id="page-footer" class="hidden">
  LiquidSystem · <span id="footer-ts"></span>
</footer>

<script>
'use strict';

// ── State ──────────────────────────────────────────────────────────────────
let pollTimer = null;
let lastCompleted = null;
let currentReportId = null;

// ── Init ───────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', async () => {
  await checkRunningStatus();
  await loadHistory();
  await loadLatest();
});

// ── Run Control ────────────────────────────────────────────────────────────
async function runNow() {
  const btn = document.getElementById('run-btn');
  btn.disabled = true;

  try {
    const resp = await fetch('/api/run', { method: 'POST' });
    const data = await resp.json();
    if (resp.status === 409 || data.status === 'already_running') {
      showBanner('running', 'Analysis already in progress…');
    } else {
      showBanner('running', 'Analysis started — this takes 10–15 seconds…');
    }
    startPolling();
  } catch (err) {
    showBanner('error', 'Failed to start analysis: ' + err.message);
    btn.disabled = false;
  }
}

async function checkRunningStatus() {
  try {
    const resp = await fetch('/api/run/status');
    const status = await resp.json();
    lastCompleted = status.last_completed;
    if (status.running) {
      showBanner('running', 'Analysis in progress…');
      document.getElementById('run-btn').disabled = true;
      startPolling();
    } else if (status.error) {
      showBanner('error', 'Last run failed: ' + status.error);
    }
  } catch (_) {}
}

function startPolling() {
  if (pollTimer) return;
  pollTimer = setInterval(async () => {
    try {
      const resp = await fetch('/api/run/status');
      const status = await resp.json();
      if (!status.running) {
        stopPolling();
        document.getElementById('run-btn').disabled = false;
        if (status.error) {
          showBanner('error', 'Analysis failed: ' + status.error);
        } else if (status.last_completed && status.last_completed !== lastCompleted) {
          lastCompleted = status.last_completed;
          showBanner('success', 'Analysis complete — loading new report…');
          await loadHistory();
          await loadReport(status.last_completed);
          setTimeout(() => hideBanner(), 4000);
        } else {
          hideBanner();
        }
      }
    } catch (_) {}
  }, 3000);
}

function stopPolling() {
  if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
}

// ── Banner ─────────────────────────────────────────────────────────────────
function showBanner(type, msg) {
  const el = document.getElementById('status-banner');
  el.className = `status-bar ${type}`;
  el.innerHTML = type === 'running'
    ? `<div class="spinner"></div>${msg}`
    : msg;
  el.classList.remove('hidden');
}

function hideBanner() {
  document.getElementById('status-banner').classList.add('hidden');
}

// ── Report History ─────────────────────────────────────────────────────────
async function loadHistory() {
  try {
    const resp = await fetch('/api/reports');
    const reports = await resp.json();
    const sel = document.getElementById('report-select');
    sel.innerHTML = '<option value="">History…</option>';
    for (const r of reports) {
      const opt = document.createElement('option');
      opt.value = r.id;
      opt.textContent = fmtTimestamp(r.created_at);
      if (r.id === currentReportId) opt.selected = true;
      sel.appendChild(opt);
    }
  } catch (_) {}
}

function onReportSelect() {
  const id = document.getElementById('report-select').value;
  if (id) loadReport(id);
}

// ── Report Loading ─────────────────────────────────────────────────────────
async function loadLatest() {
  try {
    const resp = await fetch('/api/reports/latest');
    if (resp.status === 404) {
      showEmptyState();
      return;
    }
    const data = await resp.json();
    renderReport(data);
  } catch (_) {
    showEmptyState();
  }
}

async function loadReport(id) {
  try {
    const resp = await fetch(`/api/reports/${encodeURIComponent(id)}`);
    if (!resp.ok) return;
    const data = await resp.json();
    renderReport(data);
  } catch (_) {}
}

// ── State Helpers ──────────────────────────────────────────────────────────
function showEmptyState() {
  document.getElementById('empty-state').classList.remove('hidden');
  document.getElementById('report-view').classList.add('hidden');
  document.getElementById('page-footer').classList.add('hidden');
}

function showReport() {
  document.getElementById('empty-state').classList.add('hidden');
  document.getElementById('report-view').classList.remove('hidden');
  document.getElementById('page-footer').classList.remove('hidden');
}

// ── Master Render ──────────────────────────────────────────────────────────
function renderReport(data) {
  currentReportId = data.id;
  showReport();

  // Sync history select
  const sel = document.getElementById('report-select');
  for (const opt of sel.options) {
    opt.selected = (opt.value === data.id);
  }

  // Meta row
  document.getElementById('report-id-label').textContent = data.id;
  document.getElementById('report-ts-label').textContent = fmtTimestamp(data.created_at);
  document.getElementById('footer-ts').textContent = fmtTimestamp(data.created_at);

  renderTraffic(data.traffic_data, data.client_names || {});
  renderBypass(data.bypass_data, data.client_names || {});
  renderRecommendations(data.rec_data);
  renderDevices(data.device_map || {}, data.risk_summary, data.client_names || {});
  renderAssessment(data.assessment_text);
}

// ── Traffic Section ────────────────────────────────────────────────────────
function renderTraffic(td, clientNames) {
  const s = td.summary;
  const pct = s.percent_blocked.toFixed(1);
  const cards = [
    { label: 'Total Queries',   value: fmt(s.total),           sub: fmtSub('last 24h'), cls: '' },
    { label: 'Blocked',         value: fmt(s.blocked),         sub: `${pct}% of total`, cls: 'blocked' },
    { label: 'Allowed',         value: fmt(s.allowed),         sub: `${(100 - +pct).toFixed(1)}% passed`, cls: 'allowed' },
    { label: 'Unique Domains',  value: fmt(s.unique_domains),  sub: 'distinct names seen', cls: '' },
    { label: 'Active Clients',  value: `${s.active_clients}`,  sub: `of ${s.total_clients} total`, cls: '' },
    { label: 'Gravity List',    value: fmtK(s.gravity_domains), sub: 'domains blocked', cls: '' },
  ];

  document.getElementById('stat-cards').innerHTML = cards.map(c => `
    <div class="stat-card ${c.cls}">
      <div class="stat-label">${c.label}</div>
      <div class="stat-value">${c.value}</div>
      <div class="stat-sub">${c.sub}</div>
    </div>`).join('');

  // Top allowed domains
  document.getElementById('tbl-allowed').innerHTML = makeTable(
    ['#', 'Domain', 'Queries'],
    td.top_allowed.slice(0, 15).map((d, i) => [
      `<span class="rank">${i+1}</span>`,
      `<span class="mono">${esc(d.domain)}</span>`,
      `<span class="num">${fmt(d.count)}</span>`,
    ]),
  );

  // Top blocked domains
  document.getElementById('tbl-blocked').innerHTML = makeTable(
    ['#', 'Domain', 'Queries'],
    td.top_blocked.slice(0, 15).map((d, i) => [
      `<span class="rank">${i+1}</span>`,
      `<span class="mono text-danger">${esc(d.domain)}</span>`,
      `<span class="num">${fmt(d.count)}</span>`,
    ]),
  );

  // Top clients
  document.getElementById('tbl-clients').innerHTML = makeTable(
    ['#', 'IP', 'Name', 'Queries'],
    td.top_clients.slice(0, 15).map((c, i) => {
      const name = clientNames[c.client] || c.name || '—';
      return [
        `<span class="rank">${i+1}</span>`,
        `<code>${esc(c.client)}</code>`,
        esc(name !== c.client ? name : '—'),
        `<span class="num">${fmt(c.count)}</span>`,
      ];
    }),
  );
}

// ── Bypass Section ─────────────────────────────────────────────────────────
function renderBypass(bd, clientNames) {
  const count = bd.findings.length;
  document.getElementById('bypass-count').textContent = `${count} finding${count !== 1 ? 's' : ''}`;

  let html = '';

  if (count === 0) {
    html = '<div class="alert alert-success">No DNS bypass indicators detected.</div>';
  } else {
    const methodBadge = (m) => {
      if (m === 'doh_lookup')      return '<span class="badge badge-doh">DoH/DoT</span>';
      if (m === 'ptr_lookup')      return '<span class="badge badge-ptr">PTR</span>';
      if (m === 'low_query_count') return '<span class="badge badge-low-q">Low Query</span>';
      return `<span class="badge">${esc(m)}</span>`;
    };

    html += makeTable(
      ['Client', 'Method', 'Detail', 'Count'],
      bd.findings.map(f => {
        const name = clientNames[f.client_ip] || f.client_ip;
        const label = (name !== f.client_ip) ? `${esc(name)} <span class="text-muted">(${esc(f.client_ip)})</span>` : `<code>${esc(f.client_ip)}</code>`;
        return [label, methodBadge(f.method), esc(f.detail), `<span class="num">${fmt(f.count)}</span>`];
      }),
    );
  }

  // Flagged low-query clients
  const flagged = (bd.client_stats || []).filter(s => s.flagged);
  if (flagged.length > 0) {
    html += `<div class="alert alert-warning" style="margin-top:12px">
      ⚠ ${flagged.length} client(s) have suspiciously low query counts — may be using hardcoded DNS.
    </div>`;
  }

  document.getElementById('bypass-content').innerHTML = html;
}

// ── Recommendations Section ────────────────────────────────────────────────
function renderRecommendations(rd) {
  const count = rd.recommendations.length;
  document.getElementById('rec-count').textContent = `${count} domain${count !== 1 ? 's' : ''}`;

  if (count === 0) {
    document.getElementById('rec-content').innerHTML =
      '<div class="alert alert-success">No known tracking or ad domains found in allowed queries.</div>';
    return;
  }

  const cats = rd.by_category || {};
  let html = `<div class="alert alert-warning">Found <strong>${count}</strong> domains across <strong>${Object.keys(cats).length}</strong> categories that should be blocked.</div>`;

  for (const [cat, recs] of Object.entries(cats).sort()) {
    html += `<div class="category-block">
      <div class="category-header">
        ${esc(cat)}
        <span class="cat-count">${recs.length} domain${recs.length !== 1 ? 's' : ''}</span>
      </div>
      ${makeTable(
        ['Domain', 'Queries', 'Clients'],
        recs.slice(0, 20).map(r => [
          `<code>${esc(r.domain)}</code>`,
          `<span class="num">${fmt(r.count)}</span>`,
          esc((r.clients || []).slice(0, 3).join(', ')),
        ]),
      )}
    </div>`;
  }

  document.getElementById('rec-content').innerHTML = html;
}

// ── Device Inventory Section ───────────────────────────────────────────────
function renderDevices(deviceMap, riskSummary, clientNames) {
  const entries = Object.entries(deviceMap);
  document.getElementById('device-count').textContent = `${entries.length} device${entries.length !== 1 ? 's' : ''}`;

  // Risk summary tiles
  if (riskSummary) {
    const rs = riskSummary;
    document.getElementById('risk-tiles').innerHTML = [
      { cls: 'risk-high',    label: 'High Risk',    count: rs.high_risk },
      { cls: 'risk-medium',  label: 'Medium Risk',  count: rs.medium_risk },
      { cls: 'risk-low',     label: 'Low Risk',     count: rs.low_risk },
      { cls: 'risk-minimal', label: 'Minimal Risk', count: rs.minimal_risk },
    ].map(t => `
      <div class="risk-tile ${t.cls}">
        <div class="risk-count">${t.count}</div>
        <div class="risk-label">${t.label}</div>
      </div>`).join('');
  }

  // Sort: high risk first, then by IP
  const riskOrder = { high: 0, medium: 1, low: 2, minimal: 3 };
  const sorted = entries.sort(([, a], [, b]) => {
    const rd = (riskOrder[a.privacy_risk] ?? 4) - (riskOrder[b.privacy_risk] ?? 4);
    return rd !== 0 ? rd : a.ip.localeCompare(b.ip);
  });

  document.getElementById('tbl-devices').innerHTML = makeTable(
    ['IP', 'Hostname', 'Device Type', 'Confidence', 'Risk'],
    sorted.map(([ip, info]) => {
      const hostname = clientNames[ip] || info.hostname || '';
      const conf = info.manual_override
        ? '<span class="text-muted">manual</span>'
        : `${Math.round((info.confidence || 0) * 100)}%`;
      const typeFlag = info.device_type === 'Unknown device'
        ? ' <span class="text-warning">⚠</span>' : '';
      return [
        `<code>${esc(ip)}</code>`,
        esc(hostname !== ip ? hostname : '—'),
        esc(info.device_type) + typeFlag,
        conf,
        riskBadge(info.privacy_risk),
      ];
    }),
  );
}

// ── Assessment Section ─────────────────────────────────────────────────────
function renderAssessment(text) {
  if (!text) {
    document.getElementById('assessment-content').innerHTML =
      '<em class="text-muted">No assessment available.</em>';
    return;
  }
  document.getElementById('assessment-content').innerHTML = renderMarkdown(text);
}

// ── Markdown Renderer ──────────────────────────────────────────────────────
function renderMarkdown(text) {
  // Escape HTML, then apply markdown rules
  let s = esc(text);
  const lines = s.split('\n');
  const out = [];
  let inUl = false, inOl = false, inP = false;

  const flushBlock = () => {
    if (inUl) { out.push('</ul>'); inUl = false; }
    if (inOl) { out.push('</ol>'); inOl = false; }
    if (inP)  { out.push('</p>');  inP  = false; }
  };

  for (const raw of lines) {
    const line = raw;

    // Headers (##, ###, etc.)
    const hm = line.match(/^(#{1,4}) (.+)/);
    if (hm) {
      flushBlock();
      const level = Math.min(hm[1].length, 4);
      out.push(`<h${level}>${inlineFmt(hm[2])}</h${level}>`);
      continue;
    }

    // Unordered list
    const ulm = line.match(/^[\-\*\+] (.+)/);
    if (ulm) {
      if (inOl) { out.push('</ol>'); inOl = false; }
      if (inP)  { out.push('</p>');  inP  = false; }
      if (!inUl) { out.push('<ul>'); inUl = true; }
      out.push(`<li>${inlineFmt(ulm[1])}</li>`);
      continue;
    }

    // Ordered list
    const olm = line.match(/^\d+\. (.+)/);
    if (olm) {
      if (inUl) { out.push('</ul>'); inUl = false; }
      if (inP)  { out.push('</p>');  inP  = false; }
      if (!inOl) { out.push('<ol>'); inOl = true; }
      out.push(`<li>${inlineFmt(olm[1])}</li>`);
      continue;
    }

    // Close lists on non-list line
    if (inUl) { out.push('</ul>'); inUl = false; }
    if (inOl) { out.push('</ol>'); inOl = false; }

    // Blank line
    if (line.trim() === '') {
      if (inP) { out.push('</p>'); inP = false; }
      continue;
    }

    // Regular paragraph text
    if (!inP) { out.push('<p>'); inP = true; } else { out.push(' '); }
    out.push(inlineFmt(line));
  }
  flushBlock();
  return out.join('');
}

function inlineFmt(s) {
  return s
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*([^*]+)\*/g,   '<em>$1</em>')
    .replace(/__(.+?)__/g,     '<strong>$1</strong>')
    .replace(/_([^_]+)_/g,     '<em>$1</em>')
    .replace(/`([^`]+)`/g,     '<code>$1</code>');
}

// ── DOM Helpers ────────────────────────────────────────────────────────────
function makeTable(headers, rows) {
  if (!rows.length) return '<p class="text-muted" style="padding:8px 0;font-size:0.82rem;">No data.</p>';
  const thead = headers.map(h => `<th>${h}</th>`).join('');
  const tbody = rows.map(r => `<tr>${r.map(c => `<td>${c}</td>`).join('')}</tr>`).join('');
  return `<table class="data-table"><thead><tr>${thead}</tr></thead><tbody>${tbody}</tbody></table>`;
}

function riskBadge(risk) {
  const r = risk || 'minimal';
  return `<span class="badge badge-${r}">${r}</span>`;
}

// ── Format Helpers ─────────────────────────────────────────────────────────
function fmt(n)    { return Number(n).toLocaleString(); }
function fmtK(n)   { return n >= 1e6 ? (n/1e6).toFixed(1)+'M' : n >= 1e3 ? (n/1e3).toFixed(0)+'K' : String(n); }
function fmtSub(s) { return s; }

function fmtTimestamp(iso) {
  if (!iso) return '—';
  try {
    return new Date(iso).toLocaleString(undefined, {
      year: 'numeric', month: 'short', day: 'numeric',
      hour: '2-digit', minute: '2-digit',
    });
  } catch (_) { return iso; }
}

function esc(s) {
  if (s == null) return '';
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}
